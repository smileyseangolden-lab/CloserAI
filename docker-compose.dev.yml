# Dev-only overlay. Use on a workstation where you want direct loopback
# access to postgres, redis, and the server/client for debugging AND
# hot-reload bind mounts into the server container.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# DO NOT copy this to a VPS. The base docker-compose.yml is already
# production-safe: the proxy is the only host-bound service, and the
# server runs from the code baked into its image (no bind mounts, no
# /opt read-only headaches).

services:
  postgres:
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    ports:
      - "127.0.0.1:6379:6379"

  server:
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      # Hot reload: mount the TypeScript sources into the running
      # container so tsx watch picks up edits without a rebuild.
      - ./packages/server/src:/app/packages/server/src

  client:
    ports:
      - "127.0.0.1:3000:3000"
