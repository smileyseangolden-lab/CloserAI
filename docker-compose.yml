# =====================================================================
# CloserAI compose project — VPS resource footprint
# =====================================================================
# Pin the project name so `docker compose down` from any directory name
# still targets this stack, and so network/volume/container names are
# predictable (and predictable means you can audit them against other
# apps on the same VPS without guessing).
name: closerai

# ---------------------------------------------------------------------
# Host resources this stack claims (verify no collisions with your
# other compose projects on the same VPS):
#
#   Host port:     ${PROXY_BIND:-127.0.0.1}:${PROXY_PORT:-14000}  (proxy only)
#   Docker net:    closerai-net  (subnet 10.89.0.0/16)
#   Volumes:       closerai_pgdata, closerai_redis-data
#   Containers:    closerai-postgres, closerai-redis, closerai-server,
#                  closerai-worker, closerai-client, closerai-proxy
#
# Internal docker-network ports (NOT bound to the host — these live
# only on closerai-net and cannot conflict with other apps on the
# host): 5432 postgres, 6379 redis, 4000 server/worker, 3000 client.
#
# Deliberately AVOIDED host ports on this VPS:
#   5000, 5433, 8081, 13000, 13002, 15000, 18000
# (ContractShield / Proposal Manager / other projects)
# ---------------------------------------------------------------------

services:
  postgres:
    image: postgres:16-alpine
    container_name: closerai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-closerai}
      POSTGRES_USER: ${POSTGRES_USER:-closerai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-closerai_dev_password}
    # Internal-only — reachable by other services via the docker network.
    # Expose via a dev override file (docker-compose.dev.yml) if you need
    # direct psql access from your host.
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-closerai}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - closerai-net

  redis:
    image: redis:7-alpine
    container_name: closerai-redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - closerai-net

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: closerai-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-closerai}:${POSTGRES_PASSWORD:-closerai_dev_password}@postgres:5432/${POSTGRES_DB:-closerai}
      REDIS_URL: redis://redis:6379
    expose:
      - "4000"
    networks:
      - closerai-net

  worker:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: closerai-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-closerai}:${POSTGRES_PASSWORD:-closerai_dev_password}@postgres:5432/${POSTGRES_DB:-closerai}
      REDIS_URL: redis://redis:6379
    command: ["node", "dist/jobs/worker.js"]
    networks:
      - closerai-net

  client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
    container_name: closerai-client
    restart: unless-stopped
    depends_on:
      - server
    env_file: .env
    expose:
      - "3000"
    networks:
      - closerai-net

  # -----------------------------------------------------------------------
  # Internal reverse proxy. This is the ONLY service with a host port
  # binding. It listens on ${PROXY_BIND:-127.0.0.1}:${PROXY_PORT:-14000}
  # so your VPS-level nginx can proxy_pass http://127.0.0.1:14000 for the
  # whole app (SPA + API + websockets) on a single loopback port.
  #
  # To expose the proxy directly to the public internet (no host nginx in
  # front), set PROXY_BIND=0.0.0.0 in your .env. This is useful for quick
  # IP-based testing on a VPS before a domain / TLS certs are set up.
  # -----------------------------------------------------------------------
  proxy:
    build:
      context: .
      dockerfile: deploy/Dockerfile.proxy
    container_name: closerai-proxy
    restart: unless-stopped
    depends_on:
      - server
      - client
    ports:
      - "${PROXY_BIND:-127.0.0.1}:${PROXY_PORT:-14000}:80"
    networks:
      - closerai-net

# Explicit network definition with a pinned subnet. Docker's default
# bridge auto-allocates from 172.17.0.0/16 onwards, which on a shared
# VPS can collide with other compose projects and cause "failed to set
# up container networking" or "pool overlaps" errors. Pinning an
# unusual range (10.89.0.0/16) keeps us out of everyone else's way.
networks:
  closerai-net:
    name: closerai-net
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 10.89.0.0/16
          gateway: 10.89.0.1

volumes:
  pgdata:
    name: closerai_pgdata
  redis-data:
    name: closerai_redis-data
