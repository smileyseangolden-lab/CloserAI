services:
  postgres:
    image: postgres:16-alpine
    container_name: closerai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-closerai}
      POSTGRES_USER: ${POSTGRES_USER:-closerai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-closerai_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-closerai}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: closerai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: closerai-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-closerai}:${POSTGRES_PASSWORD:-closerai_dev_password}@postgres:5432/${POSTGRES_DB:-closerai}
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    volumes:
      - ./packages/server/src:/app/packages/server/src

  worker:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: closerai-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-closerai}:${POSTGRES_PASSWORD:-closerai_dev_password}@postgres:5432/${POSTGRES_DB:-closerai}
      REDIS_URL: redis://redis:6379
    command: ["node", "dist/jobs/worker.js"]

  client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
    container_name: closerai-client
    restart: unless-stopped
    depends_on:
      - server
    env_file: .env
    ports:
      - "3000:3000"

volumes:
  pgdata:
  redis-data:
