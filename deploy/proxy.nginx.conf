# Internal nginx proxy that runs inside docker-compose as the `proxy`
# service. It fans HTTP out to the client and server containers on the
# internal docker network, and is the single host port binding for the
# entire stack (127.0.0.1:14000 or 0.0.0.0:14000 on the VPS).
#
# Your VPS-level nginx (see nginx.conf.example) then just needs to
# proxy_pass http://127.0.0.1:14000 for the public-facing vhost.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    client_max_body_size 10M;

    # Gzip static assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ---------------------------------------------------------------
    # Dynamic DNS resolution via docker's embedded resolver.
    #
    # nginx ordinarily resolves upstream hostnames once at startup and
    # caches the IPs forever. That breaks the moment we recreate a
    # client or server container, because the new container gets a
    # new IP on the docker bridge network and nginx keeps trying the
    # old one (producing "connect() failed (111: Connection refused)"
    # errors that take down the whole site).
    #
    # Pointing a `resolver` at 127.0.0.11 (docker's built-in DNS) and
    # doing `proxy_pass $variable;` forces nginx to re-resolve the
    # hostname on every request through the resolver (up to the
    # `valid` TTL), picking up the current container IP without any
    # restart of this proxy container.
    # ---------------------------------------------------------------
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    server {
        listen 80 default_server;
        server_name _;

        # API routes → express server container
        location /api/ {
            set $upstream_api server:4000;
            proxy_pass http://$upstream_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
        }

        # Socket.io websockets → express server container
        location /socket.io/ {
            set $upstream_ws server:4000;
            proxy_pass http://$upstream_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
        }

        # Everything else → the Vite dev server (SPA)
        location / {
            set $upstream_web client:3000;
            proxy_pass http://$upstream_web;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Vite HMR websockets (dev only, safe to leave in prod)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
