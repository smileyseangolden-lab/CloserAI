# Internal nginx proxy that runs inside docker-compose as the `proxy`
# service. It fans HTTP out to the client and server containers on the
# internal docker network, and is the single host port binding for the
# entire stack (127.0.0.1:14000 on the VPS).
#
# Your VPS-level nginx (see nginx.conf.example) then just needs to
# proxy_pass http://127.0.0.1:14000 for the public-facing vhost.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    client_max_body_size 10M;

    # Gzip static assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    upstream closerai_api {
        server server:4000;
        keepalive 32;
    }

    upstream closerai_web {
        server client:3000;
        keepalive 32;
    }

    server {
        listen 80 default_server;
        server_name _;

        # API routes → express server
        location /api/ {
            proxy_pass http://closerai_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
        }

        # Socket.io websockets → express server
        location /socket.io/ {
            proxy_pass http://closerai_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
        }

        # Everything else → the SPA (Vite in dev, static serve in prod)
        location / {
            proxy_pass http://closerai_web;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Vite HMR websockets (dev only, safe to leave in prod)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
